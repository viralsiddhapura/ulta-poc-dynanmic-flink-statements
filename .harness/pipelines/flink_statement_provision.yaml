pipeline:
  name: POC Flink Statement Provision
  identifier: poc_flink_statement_provision
  projectIdentifier: pocflinkworkspace
  orgIdentifier: default

  variables:
    - name: resource_name
      type: String
      description: "Resource name (e.g., us-central1_flink-statement-supply)"
      required: true
      value: <+input>

    - name: workspace_name
      type: String
      description: "Harness workspace name"
      default: "pocflinkworkspace"
      required: true

  stages:
    - stage:
        name: Extract Domain
        identifier: extract_domain
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Parse Resource Name
                  identifier: parse_resource_name
                  spec:
                    shell: Bash
                    onDelegate: true
                    delegateSelectors:
                      - poc
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          RESOURCE_NAME="<+pipeline.variables.resource_name>"
                          echo "Resource name: $RESOURCE_NAME"

                          DOMAIN=$(echo "$RESOURCE_NAME" | sed -E 's/.*flink-statement-([^_]+).*/\1/')
                          echo "Extracted domain: $DOMAIN"

                          # Save to file
                          echo "$DOMAIN" > /tmp/domain.txt

                          # Export as output variable for Harness
                          export domain=$DOMAIN
                          echo "Domain extracted: $DOMAIN"
                    outputVariables:
                      - name: domain
                        type: String
                        value: domain
                    environmentVariables: []
                  timeout: 5m

    - stage:
        name: Terraform Plan
        identifier: terraform_plan
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Git Checkout and Terraform Plan
                  identifier: terraform_plan_step
                  spec:
                    shell: Bash
                    onDelegate: true
                    delegateSelectors:
                      - poc
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          # Read domain from previous stage
                          DOMAIN=$(cat /tmp/domain.txt)
                          echo "=== Domain: $DOMAIN ==="

                          # DEBUG: Show which credentials are being used (REMOVE IN PRODUCTION)
                          echo "=== CREDENTIALS DEBUG (POC ONLY) ==="
                          echo "CONFLUENT_CLOUD_API_KEY: ${CONFLUENT_CLOUD_API_KEY}"
                          echo "CONFLUENT_CLOUD_API_SECRET: ${CONFLUENT_CLOUD_API_SECRET}"
                          echo "TF_VAR_kafka_int_flink_api_key: ${TF_VAR_kafka_int_flink_api_key}"
                          echo "TF_VAR_kafka_int_flink_api_secret: ${TF_VAR_kafka_int_flink_api_secret}"
                          echo "=== END CREDENTIALS DEBUG ==="

                          # Clone repository
                          echo "=== Cloning repository ==="
                          WORK_DIR="/tmp/terraform-workspace-$$"

                          # Remove if exists
                          rm -rf "$WORK_DIR"

                          # Clone from your public GitHub repository
                          git clone https://github.com/viralsiddhapura/ulta-poc-dynanmic-flink-statements.git "$WORK_DIR"

                          # Verify clone succeeded
                          if [ ! -d "$WORK_DIR" ]; then
                            echo "ERROR: Git clone failed"
                            exit 1
                          fi

                          echo "=== Repository cloned successfully ==="
                          ls -la "$WORK_DIR"

                          # Change to terraform directory
                          cd "$WORK_DIR/terraform/env/dev/internal-flink-statement"

                          echo "=== Current directory ==="
                          pwd
                          ls -la

                          # Get resource name
                          RESOURCE_NAME="<+pipeline.variables.resource_name>"
                          PROPERTIES_FILE="properties/dev/${RESOURCE_NAME}_properties.tfvars"

                          echo "=== Using properties file: $PROPERTIES_FILE ==="

                          # Verify properties file exists
                          if [ ! -f "$PROPERTIES_FILE" ]; then
                            echo "ERROR: Properties file not found: $PROPERTIES_FILE"
                            echo "Available files in properties/dev/:"
                            ls -la properties/dev/
                            exit 1
                          fi

                          # Show properties file content (without secrets)
                          echo "=== Properties file content ==="
                          cat "$PROPERTIES_FILE"

                          # Create state directory
                          STATE_DIR="state/${DOMAIN}"
                          mkdir -p "$STATE_DIR"
                          echo "=== State directory: $STATE_DIR ==="

                          # Initialize Terraform
                          echo "=== Initializing Terraform ==="
                          terraform init -backend-config="path=${STATE_DIR}/terraform.tfstate"

                          # Run plan
                          echo "=== Running Terraform plan ==="
                          terraform plan -var-file="$PROPERTIES_FILE" -out=tfplan

                          # Show plan
                          echo "=== Terraform plan output ==="
                          terraform show tfplan

                          # Save plan path for apply stage
                          echo "$WORK_DIR" > /tmp/work_dir.txt
                    environmentVariables:
                      - name: CONFLUENT_CLOUD_API_KEY
                        type: String
                        value: <+secrets.getValue("confluent_cloud_api_key")>
                      - name: CONFLUENT_CLOUD_API_SECRET
                        type: String
                        value: <+secrets.getValue("confluent_cloud_api_secret")>
                      - name: TF_VAR_kafka_int_flink_api_key
                        type: String
                        value: <+secrets.getValue("flink_api_key_<+execution.stages.extract_domain.spec.execution.steps.parse_resource_name.output.outputVariables.domain>")>
                      - name: TF_VAR_kafka_int_flink_api_secret
                        type: String
                        value: <+secrets.getValue("flink_api_secret_<+execution.stages.extract_domain.spec.execution.steps.parse_resource_name.output.outputVariables.domain>")>
                  timeout: 10m

    - stage:
        name: Terraform Apply
        identifier: terraform_apply
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Terraform Apply
                  identifier: terraform_apply_step
                  spec:
                    shell: Bash
                    onDelegate: true
                    delegateSelectors:
                      - poc
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          # Get work directory from plan stage
                          WORK_DIR=$(cat /tmp/work_dir.txt)
                          DOMAIN=$(cat /tmp/domain.txt)

                          echo "=== Working directory: $WORK_DIR ==="
                          echo "=== Domain: $DOMAIN ==="

                          # DEBUG: Show which credentials are being used (REMOVE IN PRODUCTION)
                          echo "=== CREDENTIALS DEBUG (POC ONLY) ==="
                          echo "CONFLUENT_CLOUD_API_KEY: ${CONFLUENT_CLOUD_API_KEY}"
                          echo "CONFLUENT_CLOUD_API_SECRET: ${CONFLUENT_CLOUD_API_SECRET}"
                          echo "TF_VAR_kafka_int_flink_api_key: ${TF_VAR_kafka_int_flink_api_key}"
                          echo "TF_VAR_kafka_int_flink_api_secret: ${TF_VAR_kafka_int_flink_api_secret}"
                          echo "=== END CREDENTIALS DEBUG ==="

                          # Change to terraform directory
                          cd "$WORK_DIR/terraform/env/dev/internal-flink-statement"

                          echo "=== Current directory ==="
                          pwd

                          # Apply the plan
                          echo "=== Applying Terraform plan ==="
                          terraform apply -auto-approve tfplan

                          # Show outputs
                          echo "=== Terraform outputs ==="
                          terraform output

                          # Cleanup
                          echo "=== Cleaning up ==="
                          rm -rf "$WORK_DIR"
                    environmentVariables:
                      - name: CONFLUENT_CLOUD_API_KEY
                        type: String
                        value: <+secrets.getValue("confluent_cloud_api_key")>
                      - name: CONFLUENT_CLOUD_API_SECRET
                        type: String
                        value: <+secrets.getValue("confluent_cloud_api_secret")>
                      - name: TF_VAR_kafka_int_flink_api_key
                        type: String
                        value: <+secrets.getValue("flink_api_key_<+execution.stages.extract_domain.spec.execution.steps.parse_resource_name.output.outputVariables.domain>")>
                      - name: TF_VAR_kafka_int_flink_api_secret
                        type: String
                        value: <+secrets.getValue("flink_api_secret_<+execution.stages.extract_domain.spec.execution.steps.parse_resource_name.output.outputVariables.domain>")>
                  timeout: 15m
        when:
          pipelineStatus: Success
          condition: <+input>
